version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: deet_postgres_db
    environment:
      POSTGRES_USER: custom_deet_user
      POSTGRES_PASSWORD: deet_secure_password
      POSTGRES_DB: resumeguard
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
