version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: deet_postgres_db
    environment:
      POSTGRES_USER: custom_deet_user
      POSTGRES_PASSWORD: deet_secure_password
      POSTGRES_DB: resumeguard
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: deet_redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  redis_data:
