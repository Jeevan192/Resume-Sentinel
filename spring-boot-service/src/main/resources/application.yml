# ─── ResumeGuard Spring Boot Service ────────────────
server:
  port: 8080

spring:
  application:
    name: resumeguard-service

  # PostgreSQL Database
  datasource:
    url: jdbc:postgresql://localhost:5433/resumeguard
    driverClassName: org.postgresql.Driver
    username: custom_deet_user
    password: deet_secure_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

# ─── CORS Config ────────────────────────────────────
cors:
  allowed-origins: "*"

# ─── Python Service Integration ─────────────────────
python:
  service:
    url: http://localhost:8000

# ─── Rule Engine Thresholds ─────────────────────────
rules:
  thresholds:
    critical: 85
    high: 65
    medium: 40
    low: 20
  weights:
    timeline: 0.25
    email: 0.15
    phone: 0.10
    plagiarism: 0.20
    similarity: 0.20
    mismatch: 0.10

# ─── Logging ────────────────────────────────────────
logging:
  level:
    com.resumeguard: INFO
    org.springframework: WARN
